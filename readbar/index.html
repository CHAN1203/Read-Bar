<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Bar · 书库</title>
<style>
  :root{
    --bg:#13161b; --surface:#1b2027; --surface2:#232b35; --ink:#e9e5d8;
    --muted:#8b94a3; --faint:#5c6573; --line:#2c343f;
    --gold:#d4a657;
    --serif: Georgia, "Songti SC", "Noto Serif SC", "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:17px; line-height:1.75; -webkit-font-smoothing:antialiased; overflow-x:hidden;}
  ::selection{background:var(--gold); color:#1a1a1a;}
  .col{max-width:980px; margin:0 auto; padding:0 28px;}

  /* masthead — neutral library identity */
  header.top{padding:74px 0 30px;
    background:radial-gradient(100% 70% at 50% -10%, rgba(212,166,87,.08), transparent 55%);}
  .top .brand{font-family:var(--serif); font-weight:600; font-size:46px; line-height:1; letter-spacing:.01em; margin:0;}
  .top .brand .dot{color:var(--gold);}
  .top .tag{color:var(--muted); font-size:16px; margin-top:14px;}

  /* filter chips */
  .filters{display:flex; flex-wrap:wrap; gap:10px; padding:22px 0 4px; border-bottom:1px solid var(--line);}
  .chip{font-family:var(--mono); font-size:13px; letter-spacing:.04em; color:var(--muted);
    background:transparent; border:1px solid var(--line); border-radius:999px; padding:6px 14px;
    cursor:pointer; transition:.18s; display:inline-flex; align-items:center; gap:7px;}
  .chip:hover{color:var(--ink); border-color:var(--faint);}
  .chip.on{color:#1a1a1a; background:var(--gold); border-color:var(--gold); font-weight:600;}
  .chip .n{font-size:11px; opacity:.7;}
  .chip.on .n{opacity:.85;}
  .chip:focus-visible{outline:2px solid var(--gold); outline-offset:3px;}

  /* shelf */
  main{padding:30px 0 0;}
  .shelf{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .book{position:relative; display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:22px 22px 20px;
    transition:transform .2s, border-color .2s, background .2s; overflow:hidden;}
  .book::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--ac,var(--gold));}
  .book:hover{transform:translateY(-3px); border-color:var(--ac,var(--gold)); background:var(--surface2);}
  .book:focus-visible{outline:2px solid var(--ac,var(--gold)); outline-offset:3px;}
  .book .head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
  .book .t{font-family:var(--serif); font-size:26px; font-weight:600; line-height:1.15;}
  .book .badge{flex:none; font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--ac,var(--gold));
    border:1px solid var(--line); border-radius:999px; padding:3px 10px; margin-top:4px; white-space:nowrap;}
  .book .one{color:var(--muted); font-size:14.5px; margin:8px 0 0;}
  .book .open{font-family:var(--mono); font-size:12.5px; color:var(--ac,var(--gold)); margin-top:16px; letter-spacing:.04em;}

  .state{color:var(--muted); font-size:15px; padding:22px 0;}
  .state code{font-family:var(--mono); font-size:13px; background:#11161c; color:var(--gold); padding:1px 6px; border-radius:4px;}

  footer{margin:90px 0 0; padding:28px 0 70px; border-top:1px solid var(--line); text-align:center;}
  footer .by{font-family:var(--mono); font-size:11.5px; color:var(--faint); letter-spacing:.08em;}

  @media (max-width:820px){
    .top .brand{font-size:38px;}
    .shelf{grid-template-columns:1fr;}
    body{font-size:16px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none!important; transition:none!important; scroll-behavior:auto!important;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="col">
    <h1 class="brand">Read Bar<span class="dot">.</span></h1>
    <div class="tag">一架自己做的交互式电子书 · 划线、批注、检索、进度,都为你记着。</div>
  </div>
</header>

<div class="col">
  <div class="filters" id="filters" role="group" aria-label="按分类筛选"></div>
</div>

<main>
  <div class="col">
    <div class="shelf" id="shelf"></div>
    <div class="state" id="state"></div>
  </div>
</main>

<footer>
  <div class="col">
    <div class="by">Read Bar · 静态托管,零后端 · 一处加书,书架自现</div>
  </div>
</footer>

<script>
(function(){
  var esc=function(s){return (s||"").replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});};
  var ALL="__all__";
  var shelf=document.getElementById("shelf");
  var filters=document.getElementById("filters");
  var state=document.getElementById("state");
  var books=[], cats=[], active=ALL;

  function card(b){
    return '<a class="book" href="'+esc(b.href)+'" style="--ac:'+esc(b.accent||"#d4a657")+'">'
      +'<div class="head"><div class="t">'+esc(b.title)+'</div>'
      +(b.category?'<span class="badge">'+esc(b.category)+'</span>':'')+'</div>'
      +'<div class="one">'+esc(b.subtitle||"")+'</div>'
      +'<div class="open">翻开 →</div></a>';
  }

  function renderChips(){
    var chips=[{key:ALL,label:"全部",n:books.length}].concat(
      cats.map(function(c){ return {key:c,label:c,n:books.filter(function(b){return b.category===c;}).length}; }));
    // a lone category adds no signal — only show chips when there's more than one
    if(cats.length<2){ filters.style.display="none"; return; }
    filters.innerHTML=chips.map(function(c){
      return '<button class="chip'+(c.key===active?" on":"")+'" data-cat="'+esc(c.key)+'"'
        +(c.key===active?' aria-pressed="true"':' aria-pressed="false"')+'>'
        +esc(c.label)+' <span class="n">'+c.n+'</span></button>';
    }).join("");
    [].forEach.call(filters.querySelectorAll(".chip"),function(ch){
      ch.addEventListener("click",function(){ active=ch.getAttribute("data-cat"); renderChips(); renderCards(); });
    });
  }

  function renderCards(){
    var list=active===ALL?books:books.filter(function(b){return b.category===active;});
    shelf.innerHTML=list.map(card).join("");
  }

  fetch("books/library.json")
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data){
      books=(data&&data.books)||[];
      if(!books.length){ state.textContent="书库还是空的。用 teaching-ebook 创作一本书,它会自动上架。"; return; }
      books.forEach(function(b){ if(b.category&&cats.indexOf(b.category)<0) cats.push(b.category); });
      renderChips(); renderCards();
    })
    .catch(function(){
      state.innerHTML='读不到书单。如果你是双击 <code>file://</code> 打开的,浏览器会拦掉本地 fetch——'
        +'请用本地服务器(<code>python -m http.server</code> 或 VS Code Live Server)或 GitHub Pages 打开。';
    });
})();
</script>
</body>
</html>
